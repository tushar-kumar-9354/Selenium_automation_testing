name: Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
      python -m pip install --upgrade pip
      python -m pip install -r TestPilotPro/requirements.txxt


    - name: Run tests
      run: |
        cd TestPilotPro
        pytest -v