name: Selenium Tests

on:
  push:
    branches:
      - main
    paths:
      # Run tests when these files/directories change
      - 'TestPilotPro/tests/**'
      - 'TestPilotPro/pages/**'
      - 'TestPilotPro/utils/**'
      - 'TestPilotPro/config.py'
      - 'TestPilotPro/requirements.txt'
      - 'TestPilotPro/data/**'
      # Exclude these files from triggering tests
      - '!.gitignore'
      - '!README.md'
      - '!guide.txt'
      - '!**/*.md'

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "TestPilotPro/requirements.txt") {
          python -m pip install -r TestPilotPro/requirements.txt
        } else {
          Write-Host "requirements.txt not found, installing default packages"
          python -m pip install pytest selenium pytest-xdist webdriver-manager
        }

    - name: Run tests
      run: |
        cd TestPilotPro
        pytest -n 2 -v --tb=short